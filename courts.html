  <!-- Application Logic -->
  <script>
    function getSystemState() {
      const defaultState = {
        coords: [
          { id: 1, name: 'Court 1', status: 'available', players: [] },
          { id: 2, name: 'Court 2', status: 'available', players: [] },
          { id: 3, name: 'Court 3', status: 'available', players: [] },
          { id: 4, name: 'Court 4', status: 'available', players: [] },
          { id: 5, name: 'Court 5', status: 'available', players: [] }
        ],
        queue: []
      };
      const stateStr = localStorage.getItem('baseline_state');
      if (!stateStr) return defaultState;

      try {
        const parsedState = JSON.parse(stateStr);
        const parsedCoords = Array.isArray(parsedState?.coords) ? parsedState.coords : [];
        const normalizedCoords = defaultState.coords.map(defaultCourt => {
          const existingCourt = parsedCoords.find(c => c.id === defaultCourt.id);
          return existingCourt
            ? {
                ...defaultCourt,
                ...existingCourt,
                players: Array.isArray(existingCourt.players) ? existingCourt.players : []
              }
            : defaultCourt;
        });

        const state = {
          coords: normalizedCoords,
          queue: Array.isArray(parsedState?.queue) ? parsedState.queue : []
        };

        if (!Array.isArray(parsedState?.coords) || parsedCoords.length !== 5) {
          saveSystemState(state);
        }

        return state;
      } catch {
        saveSystemState(defaultState);
        return defaultState;
      }
    }

    function saveSystemState(state) {
      localStorage.setItem('baseline_state', JSON.stringify(state));
    }

    function getGameLogs() {
      const logs = localStorage.getItem('baseline_game_logs');
      if (!logs) return [];
      try {
        const parsed = JSON.parse(logs);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveGameLogs(logs) {
      localStorage.setItem('baseline_game_logs', JSON.stringify(logs));
    }

    let appState = getSystemState();
    let selectedCourtId = null;
    let timerIntervalId = null;

    document.addEventListener('DOMContentLoaded', () => {
      initMobileSidebar();
      ensureCourtGameTimers();
      renderCourts();
      startCourtTimerTick();

      // Listen for cross-tab updates
      window.addEventListener('storage', (e) => {
        if (e.key === 'baseline_state') {
          appState = JSON.parse(e.newValue);
          ensureCourtGameTimers();
          renderCourts();
          if (selectedCourtId !== null) {
            openCourtModal(selectedCourtId);
          }
        }
      });

      document.getElementById('court-details-modal')?.addEventListener('click', function (e) {
        if (e.target === this) {
          closeCourtModal();
        }
      });
    });

    function renderCourts() {
      const container = document.getElementById('courts-container');
      container.innerHTML = '';

      appState.coords.slice(0, 5).forEach(court => {
        const playersCount = Array.isArray(court.players) ? court.players.length : 0;
        const isInGame = playersCount === 4;
        const isAvailable = court.status === 'available';
        const borderIndicator = isInGame ? 'bg-indigo-500' : isAvailable ? 'bg-emerald-500' : 'bg-amber-500';
        const gameTimerText = isInGame && court.gameStartedAt
          ? formatDuration(Date.now() - Number(court.gameStartedAt))
          : '--:--';

        const statusTags = isInGame
          ? `
            <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-indigo-100 text-indigo-700">In-Game</span>
            <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-amber-100 text-amber-700">Occupied</span>
          `
          : isAvailable
            ? `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-emerald-100 text-emerald-700">Available</span>`
            : `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-amber-100 text-amber-700">Occupied</span>`;

        const cardHtml = `
            <button onclick="openCourtModal(${court.id})" class="bg-white court-card rounded-xl border border-slate-200 shadow-sm flex overflow-hidden relative text-left focus:outline-none focus:ring-2 focus:ring-brand-blue min-h-[88px] items-center">
                <div class="absolute top-0 left-0 w-full h-1 ${borderIndicator}"></div>
              <div class="w-full px-5 py-4">
                <div class="flex items-center justify-between gap-4">
                  <div class="min-w-0">
                  <h3 class="font-bold text-xl text-slate-900">${court.name}</h3>
                  <p class="mt-1 text-sm text-slate-500">Click to view Team A / Team B</p>
                  <p class="mt-1 text-sm font-semibold ${isInGame ? 'text-indigo-700' : 'text-slate-400'}">Timer: ${gameTimerText}</p>
                  </div>
                  <div class="flex items-center gap-3 shrink-0">
                    ${statusTags}
                    <span class="text-sm font-semibold text-slate-600 bg-slate-100 px-2.5 py-1 rounded-full">${playersCount}/4</span>
                  </div>
                    </div>
                </div>
            </button>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
      });
    }

    function renderTeamSlots(players, elementId) {
      const teamList = document.getElementById(elementId);
      if (!teamList) return;

      const slots = [players[0], players[1]];
      teamList.innerHTML = slots.map(player => `
        <li class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700">
          ${player?.name || '—'}
        </li>
      `).join('');
    }

    function getCourtTeams(court) {
      const explicitTeamA = court.players.filter(player => player.team === 'Team A');
      const explicitTeamB = court.players.filter(player => player.team === 'Team B');

      const unassigned = court.players.filter(player => !player.team || (player.team !== 'Team A' && player.team !== 'Team B'));

      const teamA = [...explicitTeamA];
      const teamB = [...explicitTeamB];

      unassigned.forEach(player => {
        if (teamA.length <= teamB.length) teamA.push(player);
        else teamB.push(player);
      });

      return { teamA, teamB };
    }

    function openCourtModal(courtId) {
      const court = appState.coords.find(c => c.id === courtId);
      if (!court) return;

      selectedCourtId = courtId;
      document.getElementById('court-modal-title').innerText = court.name;
      const isInGame = court.players.length === 4 && !!court.gameStartedAt;
      const timerText = isInGame ? formatDuration(Date.now() - Number(court.gameStartedAt)) : '--:--';
      document.getElementById('court-modal-status').innerText = `Status: ${court.status} • Timer: ${timerText}`;

      const { teamA: teamAPlayers, teamB: teamBPlayers } = getCourtTeams(court);

      renderTeamSlots(teamAPlayers, 'team-a-list');
      renderTeamSlots(teamBPlayers, 'team-b-list');

      const canFinishGame = court.players.length === 4 && teamAPlayers.length > 0 && teamBPlayers.length > 0;
      const finishButton = document.getElementById('finish-game-btn');
      if (finishButton) {
        finishButton.disabled = !canFinishGame;
        finishButton.classList.toggle('opacity-50', !canFinishGame);
        finishButton.classList.toggle('cursor-not-allowed', !canFinishGame);
      }

      backToCourtView();

      const modal = document.getElementById('court-details-modal');
      if (!modal) return;

      modal.classList.remove('hidden');
      requestAnimationFrame(() => {
        modal.classList.remove('opacity-0');
        modal.classList.add('opacity-100');
      });
    }

    function closeCourtModal() {
      const modal = document.getElementById('court-details-modal');
      if (!modal) return;

      modal.classList.remove('opacity-100');
      modal.classList.add('opacity-0');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 200);

      selectedCourtId = null;
    }

    function openFinishGameMode() {
      if (selectedCourtId === null) return;

      const court = appState.coords.find(c => c.id === selectedCourtId);
      if (!court || court.players.length === 0) return;

      const { teamA: teamAPlayers, teamB: teamBPlayers } = getCourtTeams(court);
      if (teamAPlayers.length === 0 || teamBPlayers.length === 0) {
        return;
      }

      document.getElementById('court-view-mode').classList.add('hidden');
      document.getElementById('court-score-mode').classList.remove('hidden');

      document.getElementById('team-a-score').value = '';
      document.getElementById('team-b-score').value = '';
      document.getElementById('team-a-score').focus();
    }

    function backToCourtView() {
      document.getElementById('court-score-mode').classList.add('hidden');
      document.getElementById('court-view-mode').classList.remove('hidden');
    }

    function submitFinishedGame() {
      if (selectedCourtId === null) return;

      const court = appState.coords.find(c => c.id === selectedCourtId);
      if (!court || court.players.length === 0) return;

      const teamAScore = Number(document.getElementById('team-a-score').value);
      const teamBScore = Number(document.getElementById('team-b-score').value);

      if (!Number.isFinite(teamAScore) || !Number.isFinite(teamBScore) || teamAScore < 0 || teamBScore < 0) {
        alert('Please enter valid scores for Team A and Team B.');
        return;
      }

      const { teamA: teamAPlayers, teamB: teamBPlayers } = getCourtTeams(court);
      if (teamAPlayers.length === 0 || teamBPlayers.length === 0) {
        alert('Finish Game requires at least one player in Team A and Team B.');
        return;
      }

      const teamANames = teamAPlayers.map(player => player.name);
      const teamBNames = teamBPlayers.map(player => player.name);
      const startedAt = Number(court.gameStartedAt);
      const elapsedMs = Number.isFinite(startedAt) && startedAt > 0 ? Math.max(0, Date.now() - startedAt) : 0;
      const gameDuration = formatDuration(elapsedMs);

      let status = 'Draw';
      if (teamAScore > teamBScore) status = `Winner: Team A (${teamAScore}-${teamBScore})`;
      if (teamBScore > teamAScore) status = `Winner: Team B (${teamBScore}-${teamAScore})`;

      const now = new Date();
      const logEntry = {
        datetime: now.toLocaleString([], { month: 'short', day: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
        court: court.name,
        teamA: teamANames,
        teamB: teamBNames,
        teamAScore,
        teamBScore,
        duration: gameDuration,
        status
      };

      const logs = getGameLogs();
      logs.unshift(logEntry);
      saveGameLogs(logs);

      const finishedPlayerIds = new Set(court.players.map(player => String(player.id)));
      appState.queue.forEach(queuePlayer => {
        if (finishedPlayerIds.has(String(queuePlayer.id))) {
          queuePlayer.status = 'Waiting';
          queuePlayer.assignedCourt = null;
          queuePlayer.team = null;
          queuePlayer.autoQueue = false;
        }
      });

      court.players = [];
      court.status = 'available';
      court.gameStartedAt = null;
      saveSystemState(appState);

      closeCourtModal();
      window.location.href = 'game-logs.html';
    }

    function openLogoutModal() {
      const modal = document.getElementById('logout-modal');
      if (!modal) return;
      modal.classList.remove('hidden');
      requestAnimationFrame(() => {
        modal.classList.remove('opacity-0');
        modal.classList.add('opacity-100');
      });
    }

    function closeLogoutModal() {
      const modal = document.getElementById('logout-modal');
      if (!modal) return;
      modal.classList.remove('opacity-100');
      modal.classList.add('opacity-0');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 200);
    }

    document.getElementById('logout-modal')?.addEventListener('click', function (e) {
      if (e.target === this) {
        closeLogoutModal();
      }
    });

    function confirmLogout() {
      logout();
    }

    function initMobileSidebar() {
      const sidebarLinks = document.querySelectorAll('#app-sidebar nav a');
      sidebarLinks.forEach(link => {
        link.addEventListener('click', () => {
          if (window.innerWidth < 768) {
            closeMobileSidebar();
          }
        });
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth >= 768) {
          closeMobileSidebar(true);
        }
      });
    }

    function openMobileSidebar() {
      const sidebar = document.getElementById('app-sidebar');
      const overlay = document.getElementById('mobile-sidebar-overlay');
      if (!sidebar || !overlay) return;

      sidebar.classList.remove('hidden', '-translate-x-full');
      sidebar.classList.add('flex', 'translate-x-0');
      overlay.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function closeMobileSidebar(skipAnimation = false) {
      const sidebar = document.getElementById('app-sidebar');
      const overlay = document.getElementById('mobile-sidebar-overlay');
      if (!sidebar || !overlay) return;

      overlay.classList.add('hidden');
      sidebar.classList.remove('translate-x-0');
      sidebar.classList.add('-translate-x-full');
      document.body.classList.remove('overflow-hidden');

      if (skipAnimation || window.innerWidth >= 768) {
        sidebar.classList.remove('hidden', 'flex');
        return;
      }

      setTimeout(() => {
        if (window.innerWidth < 768) {
          sidebar.classList.remove('flex');
          sidebar.classList.add('hidden');
        }
      }, 200);
    }

    function logout() {
      sessionStorage.removeItem('baseline_auth');
      window.location.href = 'index.html';
    }

    function ensureCourtGameTimers() {
      if (!Array.isArray(appState.coords)) return;

      let hasChanges = false;
      appState.coords.forEach(court => {
        const playersCount = Array.isArray(court.players) ? court.players.length : 0;
        if (playersCount === 4) {
          if (!court.gameStartedAt) {
            court.gameStartedAt = Date.now();
            hasChanges = true;
          }
        } else if (court.gameStartedAt) {
          court.gameStartedAt = null;
          hasChanges = true;
        }
      });

      if (hasChanges) {
        saveSystemState(appState);
      }
    }

    function startCourtTimerTick() {
      if (timerIntervalId) {
        clearInterval(timerIntervalId);
      }

      timerIntervalId = setInterval(() => {
        const hasInGameCourt = appState.coords.some(court => {
          const playersCount = Array.isArray(court.players) ? court.players.length : 0;
          return playersCount === 4 && !!court.gameStartedAt;
        });

        if (!hasInGameCourt) return;

        renderCourts();
        if (selectedCourtId !== null) {
          const selectedCourt = appState.coords.find(c => c.id === selectedCourtId);
          if (selectedCourt) {
            const isInGame = selectedCourt.players.length === 4 && !!selectedCourt.gameStartedAt;
            const timerText = isInGame ? formatDuration(Date.now() - Number(selectedCourt.gameStartedAt)) : '--:--';
            const statusElement = document.getElementById('court-modal-status');
            if (statusElement) {
              statusElement.innerText = `Status: ${selectedCourt.status} • Timer: ${timerText}`;
            }
          }
        }
      }, 1000);
    }

    function formatDuration(durationMs) {
      const totalSeconds = Math.max(0, Math.floor(durationMs / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }

      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }
  </script>
</body>
