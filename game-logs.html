<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baseline Pickle Hub | Game Logs</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#3b82f6', /* blue-500 */
              accent: '#60a5fa', /* blue-400 */
              dark: '#1e293b', /* slate-800 */
            }
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f8fafc;
      /* Slate 50 */
      color: #334155;
      /* Slate 700 */
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>

<body class="font-sans antialiased min-h-screen flex overflow-hidden">

  <!-- Auth check (simulate) -->
  <script>
    if (!sessionStorage.getItem('baseline_auth')) {
      window.location.href = 'index.html';
    }
  </script>

  <!-- Sidebar -->
  <aside id="app-sidebar"
    class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col h-screen shadow-sm fixed inset-y-0 left-0 z-50 md:static md:z-20 transform -translate-x-full md:translate-x-0 transition-transform duration-200">
    <!-- Brand -->
    <div class="h-20 flex items-center px-6 border-b border-slate-100">
      <div class="flex items-center">
        <div class="flex flex-col">
          <span class="font-extrabold text-3xl leading-none text-slate-900 tracking-[-0.03em]">Baseline</span>
          <span class="text-sm font-semibold text-brand-blue tracking-[0.18em] uppercase">Pickle Hub</span>
        </div>
      </div>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
      <a href="dashboard.html"
        class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg font-medium transition-colors">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
          </path>
        </svg>
        Dashboard
      </a>

      <a href="players.html"
        class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg font-medium transition-colors">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
          </path>
        </svg>
        Players
      </a>

      <a href="courts.html"
        class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg font-medium transition-colors">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
          </path>
        </svg>
        Courts
      </a>

      <a href="game-logs.html"
        class="flex items-center gap-3 px-3 py-2.5 bg-blue-50 text-brand-blue rounded-lg font-medium transition-colors">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
          </path>
        </svg>
        Game Logs
      </a>
    </nav>

    <!-- Admin User profile footer -->
    <div class="p-4 border-t border-slate-200">
      <div class="flex items-center gap-3 px-3 py-2">
        <div class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-slate-900 truncate">Admin User</p>
          <p class="text-xs text-slate-500 truncate">Super Admin</p>
        </div>
        <button onclick="openLogoutModal()" class="text-slate-400 hover:text-rose-500 transition-colors" title="Logout">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <div id="mobile-sidebar-overlay" onclick="closeMobileSidebar()"
    class="hidden md:hidden fixed inset-0 bg-slate-900/40 z-40"></div>

  <!-- Mobile Header (Visible only on small screens) -->
  <div
    class="md:hidden fixed top-0 left-0 right-0 h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 z-30">
    <div class="flex flex-col leading-tight">
      <span class="font-extrabold text-xl leading-none text-slate-900 tracking-[-0.02em]">Baseline</span>
      <span class="text-xs font-semibold text-brand-blue tracking-[0.12em] uppercase">Pickle Hub</span>
    </div>
    <button type="button" onclick="openMobileSidebar()" aria-label="Open sidebar"
      class="text-slate-500 hover:text-slate-900 focus:outline-none">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 pt-16 md:pt-0">

    <!-- Top Header -->
    <header
      class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 z-10 shrink-0 hidden md:flex">
      <div>
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Game Logs</h1>
      </div>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8">

      <div class="max-w-6xl mx-auto flex flex-col h-full">
        <!-- Logs section -->
        <section class="flex-1 flex flex-col h-full">
          <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 mt-2 md:mt-0 gap-4">
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Match Data</h2>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
              </div>
              <input type="text" id="searchLogs"
                class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-brand-blue focus:border-brand-blue sm:text-sm"
                placeholder="Search logs...">
            </div>
          </div>

          <div
            class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex-1 flex flex-col min-h-[400px]">
            <div class="overflow-x-auto flex-1">
              <table class="min-w-full text-left text-base whitespace-nowrap">
                <thead class="bg-slate-50/80 uppercase tracking-wider text-slate-500 border-b border-slate-200">
                  <tr>
                    <th scope="col" class="px-6 py-4 font-semibold text-sm">Date & Time</th>
                    <th scope="col" class="px-6 py-4 font-semibold text-sm">Court</th>
                    <th scope="col" class="px-6 py-4 font-semibold text-sm">Players</th>
                    <th scope="col" class="px-6 py-4 font-semibold text-sm">Duration</th>
                    <th scope="col" class="px-6 py-4 font-semibold text-sm text-right">Status</th>
                  </tr>
                </thead>
                <tbody id="logs-body" class="divide-y divide-slate-200">
                  <!-- Rows injected via JS -->
                </tbody>
              </table>
            </div>

            <!-- Pagination Controls -->
            <div id="logs-pagination"
              class="flex items-center justify-between px-6 py-3 border-t border-slate-200 bg-slate-50/50 hidden">
              <div class="text-sm text-slate-500" id="logs-pagination-info">Showing 0 to 0 of 0 results</div>
              <div id="logs-page-numbers" class="flex items-center gap-2"></div>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- Logout Confirmation Modal -->
  <div id="logout-modal"
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-200">
    <div class="bg-white w-full max-w-sm rounded-2xl border border-slate-200 shadow-2xl p-6">
      <h3 class="text-lg font-bold text-slate-900">Confirm Logout</h3>
      <p class="mt-2 text-sm text-slate-600">Are you sure you want to log out?</p>
      <div class="mt-6 flex items-center justify-end gap-3">
        <button type="button" onclick="closeLogoutModal()"
          class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-lg transition-colors">
          Cancel
        </button>
        <button type="button" onclick="confirmLogout()"
          class="px-4 py-2 text-sm font-semibold text-white bg-rose-600 hover:bg-rose-700 rounded-lg transition-colors">
          Logout
        </button>
      </div>
    </div>
  </div>

  <!-- Application Logic -->
  <script>
    let allGameLogs = [];
    let logsCurrentPage = 1;
    const LOGS_PAGE_SIZE = 4;

    function getFinishedGameLogs() {
      const logsStr = localStorage.getItem('baseline_game_logs');
      if (!logsStr) return [];

      try {
        const parsed = JSON.parse(logsStr);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initMobileSidebar();
      allGameLogs = getFinishedGameLogs();
      renderLogs(allGameLogs);

      document.getElementById('searchLogs').addEventListener('input', function (e) {
        const val = e.target.value.toLowerCase();

        const filtered = allGameLogs.filter(log =>
          log.datetime.toLowerCase().includes(val) ||
          log.court.toLowerCase().includes(val) ||
          (log.duration || '').toLowerCase().includes(val) ||
          log.status.toLowerCase().includes(val) ||
          (log.teamA || []).some(p => p.toLowerCase().includes(val)) ||
          (log.teamB || []).some(p => p.toLowerCase().includes(val))
        );

        logsCurrentPage = 1;
        renderLogs(filtered);
      });
    });

    function renderLogs(logs) {
      const tbody = document.getElementById('logs-body');
      const pagination = document.getElementById('logs-pagination');
      const paginationInfo = document.getElementById('logs-pagination-info');
      const pageNumbers = document.getElementById('logs-page-numbers');
      tbody.innerHTML = '';

      if (logs.length === 0) {
        pagination.classList.add('hidden');
        tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">No finished games yet.</td></tr>`;
        return;
      }

      pagination.classList.remove('hidden');

      const totalRows = logs.length;
      const totalPages = Math.max(1, Math.ceil(totalRows / LOGS_PAGE_SIZE));
      if (logsCurrentPage > totalPages) {
        logsCurrentPage = totalPages;
      }

      const startIndex = (logsCurrentPage - 1) * LOGS_PAGE_SIZE;
      const endIndex = Math.min(startIndex + LOGS_PAGE_SIZE, totalRows);
      const pagedLogs = logs.slice(startIndex, endIndex);

      paginationInfo.innerText = `Showing ${startIndex + 1} to ${endIndex} of ${totalRows} results`;

      pageNumbers.innerHTML = '';
      for (let page = 1; page <= totalPages; page++) {
        const isActivePage = page === logsCurrentPage;
        const pageButtonClass = isActivePage
          ? 'px-3 py-1.5 bg-emerald-600 border border-emerald-600 text-white rounded-md text-sm font-semibold shadow-sm'
          : 'px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md text-sm font-semibold hover:bg-slate-50 transition-colors';

        pageNumbers.insertAdjacentHTML('beforeend', `
          <button type="button" onclick="goToLogsPage(${page})" class="${pageButtonClass}">${page}</button>
        `);
      }

      pagedLogs.forEach(log => {
        let statusBadge = '';
        if (log.status.startsWith('Winner: Team A')) statusBadge = 'bg-emerald-50 text-emerald-700 border-emerald-300';
        else if (log.status.startsWith('Winner: Team B')) statusBadge = 'bg-green-50 text-green-700 border-green-300';
        else statusBadge = 'bg-emerald-50 text-emerald-700 border-emerald-200';

        const teamAPlayers = Array.isArray(log.teamA) ? log.teamA : [];
        const teamBPlayers = Array.isArray(log.teamB) ? log.teamB : [];

        const teamAText = teamAPlayers.length ? teamAPlayers.join(', ') : '—';
        const teamBText = teamBPlayers.length ? teamBPlayers.join(', ') : '—';
        const durationText = log.duration || '—';

        const row = `
            <tr class="hover:bg-slate-50 transition-colors group">
            <td class="px-6 py-5 text-slate-700 font-medium">${log.datetime}</td>
            <td class="px-6 py-5 text-emerald-700 font-bold">${log.court}</td>
                <td class="px-6 py-4">
            <div class="max-w-[340px] space-y-2 text-sm leading-relaxed">
             <div><span class="font-bold text-slate-800">Team A:</span> <span class="text-slate-700">${teamAText}</span></div>
             <div><span class="font-bold text-slate-800">Team B:</span> <span class="text-slate-700">${teamBText}</span></div>
                    </div>
                </td>
              <td class="px-6 py-5 text-slate-700 font-semibold">${durationText}</td>
            <td class="px-6 py-5 text-right">
              <span class="inline-flex items-center px-4 py-1.5 text-sm font-bold rounded-full border ${statusBadge}">${log.status}</span>
                </td>
            </tr>
        `;
        tbody.insertAdjacentHTML('beforeend', row);
      });
    }

    function goToLogsPage(pageNumber) {
      logsCurrentPage = pageNumber;

      const searchValue = document.getElementById('searchLogs').value.toLowerCase();
      const filtered = allGameLogs.filter(log =>
        log.datetime.toLowerCase().includes(searchValue) ||
        log.court.toLowerCase().includes(searchValue) ||
        (log.duration || '').toLowerCase().includes(searchValue) ||
        log.status.toLowerCase().includes(searchValue) ||
        (log.teamA || []).some(p => p.toLowerCase().includes(searchValue)) ||
        (log.teamB || []).some(p => p.toLowerCase().includes(searchValue))
      );

      renderLogs(filtered);
    }

    function openLogoutModal() {
      const modal = document.getElementById('logout-modal');
      if (!modal) return;
      modal.classList.remove('hidden');
      requestAnimationFrame(() => {
        modal.classList.remove('opacity-0');
        modal.classList.add('opacity-100');
      });
    }

    function closeLogoutModal() {
      const modal = document.getElementById('logout-modal');
      if (!modal) return;
      modal.classList.remove('opacity-100');
      modal.classList.add('opacity-0');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 200);
    }

    document.getElementById('logout-modal')?.addEventListener('click', function (e) {
      if (e.target === this) {
        closeLogoutModal();
      }
    });

    function confirmLogout() {
      logout();
    }

    function initMobileSidebar() {
      const sidebarLinks = document.querySelectorAll('#app-sidebar nav a');
      sidebarLinks.forEach(link => {
        link.addEventListener('click', () => {
          if (window.innerWidth < 768) {
            closeMobileSidebar();
          }
        });
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth >= 768) {
          closeMobileSidebar(true);
        }
      });
    }

    function openMobileSidebar() {
      const sidebar = document.getElementById('app-sidebar');
      const overlay = document.getElementById('mobile-sidebar-overlay');
      if (!sidebar || !overlay) return;

      sidebar.classList.remove('hidden', '-translate-x-full');
      sidebar.classList.add('flex', 'translate-x-0');
      overlay.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function closeMobileSidebar(skipAnimation = false) {
      const sidebar = document.getElementById('app-sidebar');
      const overlay = document.getElementById('mobile-sidebar-overlay');
      if (!sidebar || !overlay) return;

      overlay.classList.add('hidden');
      sidebar.classList.remove('translate-x-0');
      sidebar.classList.add('-translate-x-full');
      document.body.classList.remove('overflow-hidden');

      if (skipAnimation || window.innerWidth >= 768) {
        sidebar.classList.remove('hidden', 'flex');
        return;
      }

      setTimeout(() => {
        if (window.innerWidth < 768) {
          sidebar.classList.remove('flex');
          sidebar.classList.add('hidden');
        }
      }, 200);
    }

    function logout() {
      sessionStorage.removeItem('baseline_auth');
      window.location.href = 'index.html';
    }
  </script>
</body>

</html>
